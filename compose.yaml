services:
  pgadmin:
    image: ${PGADMIN_IMAGE:-dpage/pgadmin4:9}
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?set in Coolify or .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?set in Coolify or .env}
      PGADMIN_DISABLE_POSTFIX: ${PGADMIN_DISABLE_POSTFIX:-true}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: ${PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION:-True}
    ports:
      - "${PGADMIN_HOST_BIND_ADDRESS:-127.0.0.1}:${PGADMIN_HOST_PORT:-5050}:80"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  pgadmin-data:
